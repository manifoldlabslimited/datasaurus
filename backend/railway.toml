[build]
dockerfilePath = "Dockerfile"
watchPatterns = ["src/**", "pyproject.toml", "uv.lock", "Dockerfile", "railway.toml"]

[deploy]
# Health check — Railway hits this after deploy to confirm the service is up
healthcheckPath = "/shapes"
healthcheckTimeout = 120

# Restart on crash, up to 5 times
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Single replica, single region (free tier)
numReplicas = 1
